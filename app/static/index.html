<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두리부기</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="두리부기 웹">
  <link rel="apple-touch-icon" href="/private_mobile.png">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script>
    // Apply saved theme before render to prevent flash
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

<!-- PIN Lock Screen -->
<template x-if="pinRequired && !pinAuthenticated">
  <div class="pin-overlay">
    <div class="pin-box">
      <img src="/logo.png" alt="두리부기" class="pin-logo-img">
      <div class="pin-logo">두리부기</div>
      <p class="pin-subtitle">부부공동 복식가계부</p>
      <p class="pin-desc">PIN을 입력하세요</p>
      <div class="pin-display">
        <template x-for="(c, i) in pinInput.split('')" :key="i">
          <span class="pin-dot filled"></span>
        </template>
        <span class="pin-cursor"></span>
      </div>
      <div x-show="pinError" class="pin-error" x-text="pinError"></div>
      <div class="pin-pad">
        <template x-for="n in [1,2,3,4,5,6,7,8,9,'submit',0,'del']" :key="'pad-'+n">
          <button class="pin-key"
                  :class="{'pin-key-submit': n === 'submit'}"
                  :disabled="(n === 'submit' && pinInput.length === 0) || pinLocked"
                  @click="pinKeyPress(n)">
            <span x-show="typeof n === 'number'" x-text="n"></span>
            <svg x-show="n === 'del'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            <svg x-show="n === 'submit'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/></svg>
          </button>
        </template>
      </div>
    </div>
  </div>
</template>

<div class="app-layout" x-show="!pinRequired || pinAuthenticated" x-cloak>
  <aside class="sidebar" :class="sidebarOpen ? 'open' : 'collapsed'">
    <div class="sidebar-header">
      <div class="sidebar-logo" x-show="sidebarOpen">
        <img src="/logo.png" alt="두리부기" class="logo-icon-img">
        <span class="logo-text">두리부기</span>
      </div>
      <button class="sidebar-toggle" @click="toggleSidebar()" :title="sidebarOpen ? '메뉴 접기' : '메뉴 펼치기'">
        <svg x-show="sidebarOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        <svg x-show="!sidebarOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" :class="{ active: page==='dashboard' }" @click.prevent="page='dashboard'"
         :title="sidebarOpen ? '' : '대시보드'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">대시보드</span>
      </a>
      <a href="#" :class="{ active: page==='review' }" @click.prevent="page='review'; loadEntries(0)"
         :title="sidebarOpen ? '' : '검토 대기'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span class="nav-label">검토 대기</span>
        <span class="badge" x-show="pendingCount > 0 && sidebarOpen" x-text="pendingCount"></span>
      </a>
      <a href="#" :class="{ active: page==='transactions' }" @click.prevent="page='transactions'; newEntry(); loadEntries(1)"
         :title="sidebarOpen ? '' : '거래 내역'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <span class="nav-label">거래 내역</span>
      </a>
      <a href="#" :class="{ active: page==='accounts' }" @click.prevent="page='accounts'; loadAccounts()"
         :title="sidebarOpen ? '' : '계정'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        <span class="nav-label">계정</span>
      </a>
      <a href="#" :class="{ active: page==='report' }" @click.prevent="page='report'; loadReport()"
         :title="sidebarOpen ? '' : '리포트'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">리포트</span>
      </a>
      <a href="#" :class="{ active: page==='assets' }" @click.prevent="page='assets'; loadAssetSummary()"
         :title="sidebarOpen ? '' : '자산관리'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">자산관리</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" :class="{ active: page==='messages' }" @click.prevent="page='messages'; loadAllAccounts(); loadMessages()"
         :title="sidebarOpen ? '' : '메시지'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="nav-label">메시지</span>
      </a>
      <a href="#" :class="{ active: page==='settings' }" @click.prevent="page='settings'; loadSettings()"
         :title="sidebarOpen ? '' : '설정'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="nav-label">설정</span>
      </a>
      <div x-show="currentUser && sidebarOpen" class="sidebar-user">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span x-text="currentUser"></span>
      </div>
    </div>
  </aside>
  <!-- Mobile backdrop -->
  <div class="sidebar-backdrop" x-show="sidebarOpen" @click="toggleSidebar()" x-cloak></div>

  <main class="main-content">
    <!-- Mobile menu button (visible only when sidebar is collapsed on mobile) -->
    <button class="mobile-menu-btn" x-show="!sidebarOpen" @click="toggleSidebar()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="container">

  <!-- Dashboard -->
  <template x-if="page==='dashboard'">
    <div>
      <h1>대시보드</h1>
      <div class="stats">
        <div class="card stat-card">
          <div class="value amount-income" x-text="fmt(dash.total_asset)"></div>
          <div class="label">총 자산</div>
        </div>
        <div class="card stat-card">
          <div class="value amount-expense" x-text="fmt(dash.total_liability)"></div>
          <div class="label">총 부채</div>
        </div>
        <div class="card stat-card">
          <div class="value" x-text="fmt(dash.net_worth)"></div>
          <div class="label">순자산</div>
        </div>
        <div class="card stat-card">
          <div class="value" x-text="dash.pending_count"></div>
          <div class="label">검토 대기</div>
        </div>
      </div>

      <h2>수입/비용 (월별)</h2>
      <div class="card">
        <table>
          <thead><tr><th>월</th><th>수입</th><th>비용</th><th>차이</th></tr></thead>
          <tbody>
            <template x-for="m in monthly" :key="m.month">
              <tr>
                <td x-text="m.month"></td>
                <td class="amount amount-income" x-text="fmt(m.income)"></td>
                <td class="amount amount-expense" x-text="fmt(m.expense)"></td>
                <td class="amount" :class="m.income-m.expense>=0?'amount-income':'amount-expense'"
                    x-text="fmt(m.income - m.expense)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <h2>계정별 잔액</h2>
      <template x-for="type in ['asset','liability','income','expense']" :key="type">
        <div class="card" style="margin-bottom:8px">
          <h2 x-text="typeLabel(type)" style="margin-bottom:8px"></h2>
          <template x-for="item in groupedAccounts(type)" :key="item.id">
            <div>
              <!-- Group header with subtotal -->
              <template x-if="item._isGroup">
                <div :style="`display:flex;justify-content:space-between;padding:6px 0 2px ${item._depth*16}px;font-size:${item._depth?13:14}px;font-weight:bold;border-bottom:1px solid var(--border)`">
                  <span x-text="item.name"></span>
                  <span class="amount" x-text="fmt(item._subtotal)"></span>
                </div>
              </template>
              <!-- Leaf account -->
              <template x-if="!item._isGroup">
                <div :style="`display:flex;justify-content:space-between;padding:3px 0 3px ${item._depth*16}px;font-size:${item._depth>1?12:item._depth?13:14}px`">
                  <span><span style="color:var(--text-muted);margin-right:8px" x-text="item.code"></span><span x-text="item.name"></span></span>
                  <span class="amount" x-text="fmt(item.balance)"></span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- Review -->
  <template x-if="page==='review'">
    <div>
      <h1>검토 대기</h1>

      <!-- 배치 액션 바 -->
      <template x-if="entries.length > 0">
        <div class="batch-bar">
          <label class="batch-select-all">
            <input type="checkbox" :checked="allSelected()" @change="allSelected() ? clearSelection() : selectAllEntries()">
            <span x-text="selectedEntryIds.length > 0 ? selectedEntryIds.length + '건 선택됨' : '전체 선택'"></span>
          </label>
          <button class="btn btn-sm btn-success" :disabled="selectedEntryIds.length === 0"
                  @click="confirmSelected()">
            선택 승인
          </button>
        </div>
      </template>

      <template x-if="entries.length===0">
        <div class="card" style="text-align:center;color:var(--text-muted);padding:40px">
          검토할 항목이 없습니다
        </div>
      </template>
      <template x-for="e in entries" :key="e.id">
        <div class="card" :class="isEntrySelected(e.id) ? 'card-selected' : ''" @click.self="toggleSelectEntry(e.id)">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px">
              <input type="checkbox" :checked="isEntrySelected(e.id)" @change="toggleSelectEntry(e.id)"
                     style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
              <div>
                <strong x-text="e.description"></strong>
                <span style="color:var(--text-muted);margin-left:8px" x-text="fmtDate(e.entry_date)"></span>
                <span style="color:var(--text-muted);margin-left:6px;font-size:12px" x-text="fmtTime(e.created_at)"></span>
              </div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm btn-success" @click.stop="confirmEntry(e.id)">승인</button>
              <button class="btn btn-sm btn-outline" @click.stop="editExistingEntry(e)">수정</button>
              <button class="btn btn-sm btn-danger" @click.stop="rejectEntry(e.id)">거부</button>
            </div>
          </div>
          <template x-for="l in e.lines" :key="l.id">
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0">
              <span>
                <span style="color:var(--text-muted)" x-text="l.account_code"></span>
                <span x-text="l.account_name"></span>
              </span>
              <span>
                <span x-show="l.debit>0" class="amount" x-text="'차변 '+fmt(l.debit)"></span>
                <span x-show="l.credit>0" class="amount" x-text="'대변 '+fmt(l.credit)"></span>
              </span>
            </div>
          </template>
          <div x-show="e.raw_content" class="raw-msg" x-text="e.raw_content"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Transactions -->
  <template x-if="page==='transactions'">
    <div>
      <h1>거래 내역</h1>
      <div class="txn-split">
        <!-- Left: Quick input -->
        <div class="txn-input">
          <div class="card">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">빠른 입력</h3>
            <div class="form-row">
              <div class="form-group">
                <label>날짜</label>
                <input type="date" x-model="editingEntry.entry_date">
              </div>
              <div class="form-group">
                <label>금액 <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(할부: 금액/개월)</span></label>
                <input type="text" inputmode="numeric" x-ref="amountInput"
                       :value="editAmountRaw ? editAmountRaw.replace(/^[\d,]+/, m => Number(m.replace(/,/g,'')).toLocaleString()) : (editAmount ? editAmount.toLocaleString() : '')"
                       @input="(() => {
                         const el = $refs.amountInput;
                         const pos = el.selectionStart;
                         const oldLen = el.value.length;
                         const v = $event.target.value;
                         if (v.includes('/')) {
                           editAmountRaw = v.replace(/,/g,'');
                           const inst = parseInstallment(v);
                           editAmount = inst ? inst.total : 0;
                         } else {
                           editAmountRaw = '';
                           editAmount = Number(v.replace(/,/g,'')) || 0;
                         }
                         $nextTick(() => { const diff = el.value.length - oldLen; el.setSelectionRange(pos + diff, pos + diff); });
                       })()"
                       @keydown.enter="quickSaveEntry()"
                       placeholder="15,000 또는 2000000/5">
                <div x-show="installmentInfo()" x-cloak
                     style="margin-top:4px;padding:6px 10px;background:var(--surface);border-radius:6px;font-size:12px;color:var(--text-muted)">
                  <template x-if="installmentInfo()">
                    <div>
                      <span style="font-weight:600;color:var(--primary)">할부 <span x-text="installmentInfo().months"></span>개월</span>
                      &mdash; 총 <span x-text="installmentInfo().total.toLocaleString()"></span>원<br>
                      첫달: <span style="font-weight:600" x-text="installmentInfo().first.toLocaleString()"></span>원,
                      나머지: <span x-text="installmentInfo().monthly.toLocaleString()"></span>원/월
                      <span style="font-size:11px;color:var(--text-muted)">(100원 미만 절삭)</span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>설명</label>
              <input type="text" x-model="editingEntry.description" placeholder="스타벅스 아메리카노" @keydown.enter="quickSaveEntry()">
            </div>
            <div class="form-group">
              <label>메모</label>
              <textarea x-model="editingEntry.memo" placeholder="선택사항" rows="2"
                        @keydown.enter.prevent="if($event.ctrlKey||$event.shiftKey){editingEntry.memo+='\n'}else{quickSaveEntry()}"
                        style="resize:vertical;min-height:36px"></textarea>
            </div>

            <div x-show="availableGroups().length > 0" class="group-filter" x-cloak>
              <span class="group-filter-label">그룹 필터</span>
              <div class="group-filter-chips">
                <template x-for="g in availableGroups()" :key="g.name">
                  <label :class="isGroupNameVisible(g.ids) ? 'group-chip group-chip-active' : 'group-chip'" @click="toggleGroupFilter(g.ids)">
                    <span x-text="g.name"></span>
                  </label>
                </template>
              </div>
            </div>

            <div style="margin-bottom:8px;display:flex;align-items:center;gap:6px">
              <label style="font-size:13px;font-weight:600;color:var(--text)">차변</label>
              <span class="info-tip" @click="showDebitTip=!showDebitTip" title="차변이란?">i</span>
            </div>
            <div class="info-tip-box" x-show="showDebitTip" x-cloak>
              돈이 <strong>어디로 갔는지</strong>를 선택하세요.<br>
              예) 밥을 먹었으면 → <strong>식비</strong>, 월급을 받았으면 → <strong>통장(자산)</strong>
            </div>
            <div class="acct-pick-types">
              <template x-for="t in allGroupedAccounts()" :key="t.type">
                <div class="acct-pick-type">
                  <span class="acct-pick-type-label" x-text="t.label"></span>
                  <div class="acct-pick-type-body">
                    <template x-for="g in t.groups" :key="g.label || '_ungrouped'">
                      <div class="acct-pick-group" :class="g.label && 'has-group-label'">
                        <template x-if="g.label">
                          <span class="acct-pick-group-label" x-text="g.label"></span>
                        </template>
                        <div class="acct-pick-grid">
                          <template x-for="a in g.accounts" :key="a.id">
                            <button class="acct-pick" :class="editDebitAcct===a.id && 'acct-pick-active'"
                                    @click="editDebitAcct=a.id" x-text="a.name"></button>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <div style="margin-top:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
              <label style="font-size:13px;font-weight:600;color:var(--text)">대변</label>
              <span class="info-tip" @click="showCreditTip=!showCreditTip" title="대변이란?">i</span>
            </div>
            <div class="info-tip-box" x-show="showCreditTip" x-cloak>
              돈이 <strong>어디서 나왔는지</strong>를 선택하세요.<br>
              예) 카드로 결제했으면 → <strong>카드(부채)</strong>, 현금으로 냈으면 → <strong>현금(자산)</strong>
            </div>
            <div class="acct-pick-types">
              <template x-for="t in allGroupedAccounts()" :key="t.type">
                <div class="acct-pick-type">
                  <span class="acct-pick-type-label" x-text="t.label"></span>
                  <div class="acct-pick-type-body">
                    <template x-for="g in t.groups" :key="g.label || '_ungrouped'">
                      <div class="acct-pick-group" :class="g.label && 'has-group-label'">
                        <template x-if="g.label">
                          <span class="acct-pick-group-label" x-text="g.label"></span>
                        </template>
                        <div class="acct-pick-grid">
                          <template x-for="a in g.accounts" :key="a.id">

            </div>
          </template>
          <template x-if="periodMode==='custom' || periodMode==='thisMonth'">
            <div style="display:flex;gap:6px;align-items:center">
              <select style="width:95px" x-effect="$nextTick(()=>$el.value=reportStart.slice(0,4))" @change="setMonthRange($event.target.value+'-'+reportStart.slice(5,7), reportEnd.slice(0,7))">
                <template x-for="y in periodYears()" :key="y"><option :value="y" x-text="y+'년'"></option></template>
              </select>
              <select style="width:70px" x-effect="$nextTick(()=>$el.value=reportStart.slice(5,7).replace(/^0/,''))" @change="setMonthRange(reportStart.slice(0,4)+'-'+String($event.target.value).padStart(2,'0'), reportEnd.slice(0,7))">
                <template x-for="m in 12" :key="m"><option :value="m" x-text="m+'월'"></option></template>
              </select>
              <span style="color:var(--text-muted)">~</span>
              <select style="width:95px" x-effect="$nextTick(()=>$el.value=reportEnd.slice(0,4))" @change="setMonthRange(reportStart.slice(0,7), $event.target.value+'-'+reportEnd.slice(5,7))">
                <template x-for="y in periodYears()" :key="y"><option :value="y" x-text="y+'년'"></option></template>
              </select>
              <select style="width:70px" x-effect="$nextTick(()=>$el.value=reportEnd.slice(5,7).replace(/^0/,''))" @change="setMonthRange(reportStart.slice(0,7), reportEnd.slice(0,4)+'-'+String($event.target.value).padStart(2,'0'))">
                <template x-for="m in 12" :key="m"><option :value="m" x-text="m+'월'"></option></template>
              </select>
            </div>
          </template>
          <button class="btn btn-sm btn-outline" @click="shiftPeriod(1)">&rsaquo;</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab" :class="reportTab==='trend' && 'active'" @click="reportTab='trend'; $nextTick(()=>drawChart())">자산추이</div>
        <div class="tab" :class="reportTab==='ie' && 'active'" @click="reportTab='ie'">비용수익</div>
        <div class="tab" :class="reportTab==='monthly' && 'active'" @click="reportTab='monthly'; $nextTick(()=>drawMonthlyChart())">월별</div>
        <div class="tab" :class="reportTab==='tags' && 'active'" @click="reportTab='tags'; loadTags()">태그</div>
      </div>

      <!-- Tab: 자산추이 -->
      <template x-if="reportTab==='trend'">
        <div x-effect="reportShowAsset; reportShowLiability; reportShowNetWorth; $nextTick(()=>drawChart())">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="reportShowAsset"> <span class="report-legend asset-dot"></span> 자산
            </label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="reportShowLiability"> <span class="report-legend liability-dot"></span> 부채
            </label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="reportShowNetWorth"> <span class="report-legend networth-dot"></span> 순자산
            </label>
          </div>
          <div class="card">
            <canvas id="report-chart" style="width:100%;height:300px"></canvas>
          </div>
          <div class="card" style="padding:0">
            <table>
              <thead>
                <tr>
                  <th>날짜</th>
                  <th x-show="reportShowAsset" class="amount">자산</th>
                  <th x-show="reportShowLiability" class="amount">부채</th>
                  <th x-show="reportShowNetWorth" class="amount">순자산</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="r in reportDataSampled()" :key="r.date">
                  <tr>
                    <td x-text="r.date"></td>
                    <td x-show="reportShowAsset" class="amount amount-income" x-text="fmt(r.asset)"></td>
                    <td x-show="reportShowLiability" class="amount amount-expense" x-text="fmt(r.liability)"></td>
                    <td x-show="reportShowNetWorth" class="amount" x-text="fmt(r.net_worth)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>

      <!-- Tab: 비용수익 -->
      <template x-if="reportTab==='ie'">
        <div>
          <div class="acct-grid">
            <!-- 비용 -->
            <div>
              <div class="card ie-card">
                <h3 class="ie-section-title">비용</h3>
                <div class="ie-row ie-row-total">
                  <span class="ie-name">총 비용</span>
                  <div class="ie-bar-wrap"><div class="ie-bar ie-bar-expense" style="width:100%"></div></div>
                  <span class="ie-val amount-expense" x-text="fmt(incExp.total_expense)"></span>
                </div>
                <template x-for="a in ieTree('expense')" :key="a.id">
                  <div class="ie-row" :class="a._isGroup ? 'ie-row-group' : 'ie-row-leaf'"
                       :style="'padding-left:' + (a._depth * 20) + 'px'">
                    <span class="ie-name" x-text="a.name"></span>
                    <div class="ie-bar-wrap"><div class="ie-bar ie-bar-expense"
                         :style="'width:' + iePercent(a._total, incExp.total_expense) + '%'"></div></div>
                    <span class="ie-val" x-text="fmt(a._total)"></span>
                    <span class="ie-pct" x-text="iePercent(a._total, incExp.total_expense) + '%'"></span>
                  </div>
                </template>
              </div>
            </div>

            <!-- 수익 + 당기순손익 -->
            <div>
              <div class="card ie-card">
                <h3 class="ie-section-title">수익</h3>
                <div class="ie-row ie-row-total">
                  <span class="ie-name">총 수익</span>
                  <div class="ie-bar-wrap"><div class="ie-bar ie-bar-income" style="width:100%"></div></div>
                  <span class="ie-val amount-income" x-text="fmt(incExp.total_income)"></span>
                </div>
                <template x-for="a in ieTree('income')" :key="a.id">
                  <div class="ie-row" :class="a._isGroup ? 'ie-row-group' : 'ie-row-leaf'"
                       :style="'padding-left:' + (a._depth * 20) + 'px'">
                    <span class="ie-name" x-text="a.name"></span>
                    <div class="ie-bar-wrap"><div class="ie-bar ie-bar-income"
                         :style="'width:' + iePercent(a._total, incExp.total_income) + '%'"></div></div>
                    <span class="ie-val" x-text="fmt(a._total)"></span>
                    <span class="ie-pct" x-text="iePercent(a._total, incExp.total_income) + '%'"></span>
                  </div>
                </template>
              </div>

              <div class="card ie-card" style="margin-top:12px">
                <h3 class="ie-section-title">당기순손익</h3>
                <div class="ie-row ie-row-total">
                  <span class="ie-name">총 당기순손익</span>
                  <div class="ie-bar-wrap">
                    <div class="ie-bar" :class="incExp.net_income >= 0 ? 'ie-bar-income' : 'ie-bar-expense'"
                         :style="'width:' + Math.min(100, Math.abs(iePercent(incExp.net_income, Math.max(incExp.total_income, incExp.total_expense)))) + '%'"></div>
                  </div>
                  <span class="ie-val" :class="incExp.net_income >= 0 ? 'amount-income' : 'amount-expense'"
                        x-text="fmt(incExp.net_income)"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Tab: 월별 -->
      <template x-if="reportTab==='monthly'">
        <div x-effect="monthlyShowIncome; monthlyShowExpense; monthlyShowNet; $nextTick(()=>drawMonthlyChart())">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="monthlyShowIncome">
              <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--income)"></span> 수익
            </label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="monthlyShowExpense">
              <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--expense)"></span> 비용
            </label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" x-model="monthlyShowNet">
              <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--primary)"></span> 당기순손익
            </label>
          </div>
          <div class="card" style="position:relative">
            <canvas id="monthly-chart" style="width:100%;height:350px"></canvas>
            <div x-show="monthlyHover" x-cloak
                 :style="'position:absolute;pointer-events:none;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);left:'+((monthlyHover||{}).x||0)+'px;top:'+((monthlyHover||{}).y-90||0)+'px;transform:translateX(-50%)'">
              <template x-if="monthlyHover">
                <div>
                  <div style="font-weight:700;margin-bottom:4px" x-text="monthlyHover.month"></div>
                  <div><span style="color:var(--income)">수익</span> : <span x-text="fmt(monthlyHover.income)"></span></div>
                  <div><span style="color:var(--expense)">비용</span> : <span x-text="fmt(monthlyHover.expense)"></span></div>
                  <div>당기순손익 : <span :class="monthlyHover.net>=0?'amount-income':'amount-expense'" x-text="fmt(monthlyHover.net)"></span></div>
                  <div>이익률 : <span x-text="monthlyHover.rate + '%'"></span></div>
                </div>
              </template>
            </div>
          </div>

          <template x-if="monthlySummary()">
            <div class="card" style="padding:0;margin-top:12px">
              <table>
                <thead>
                  <tr><th></th><th class="amount">수익</th><th class="amount">비용</th><th class="amount">당기순손익</th><th class="amount">이익률</th></tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="font-weight:700">기간내합계</td>
                    <td class="amount amount-income" x-text="fmt(monthlySummary().total.income)"></td>
                    <td class="amount amount-expense" x-text="fmt(monthlySummary().total.expense)"></td>
                    <td class="amount" :class="monthlySummary().total.net>=0?'amount-income':'amount-expense'" x-text="fmt(monthlySummary().total.net)"></td>
                    <td class="amount" x-text="monthlySummary().total.profitRate + '%'"></td>
                  </tr>
                  <tr>
                    <td style="font-weight:700">월간 평균</td>
                    <td class="amount amount-income" x-text="fmt(monthlySummary().monthly.income)"></td>
                    <td class="amount amount-expense" x-text="fmt(monthlySummary().monthly.expense)"></td>
                    <td class="amount" :class="monthlySummary().monthly.net>=0?'amount-income':'amount-expense'" x-text="fmt(monthlySummary().monthly.net)"></td>
                    <td class="amount" style="color:var(--text-muted)">.</td>
                  </tr>
                  <tr>
                    <td style="font-weight:700">주간 평균</td>
                    <td class="amount amount-income" x-text="fmt(monthlySummary().weekly.income)"></td>
                    <td class="amount amount-expense" x-text="fmt(monthlySummary().weekly.expense)"></td>
                    <td class="amount" :class="monthlySummary().weekly.net>=0?'amount-income':'amount-expense'" x-text="fmt(monthlySummary().weekly.net)"></td>
                    <td class="amount" style="color:var(--text-muted)">.</td>
                  </tr>
                  <tr>
                    <td style="font-weight:700">일간 평균</td>
                    <td class="amount amount-income" x-text="fmt(monthlySummary().daily.income)"></td>
                    <td class="amount amount-expense" x-text="fmt(monthlySummary().daily.expense)"></td>
                    <td class="amount" :class="monthlySummary().daily.net>=0?'amount-income':'amount-expense'" x-text="fmt(monthlySummary().daily.net)"></td>
                    <td class="amount" style="color:var(--text-muted)">.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </template>

          <div class="card" style="padding:0;margin-top:12px">
            <table>
              <thead><tr><th>월</th><th class="amount">수입</th><th class="amount">비용</th><th class="amount">당기순손익</th><th class="amount">이익률</th></tr></thead>
              <tbody>
                <template x-for="m in monthly" :key="m.month">
                  <tr>
                    <td x-text="m.month"></td>
                    <td class="amount amount-income" x-text="fmt(m.income)"></td>
                    <td class="amount amount-expense" x-text="fmt(m.expense)"></td>
                    <td class="amount" :class="m.income-m.expense>=0?'amount-income':'amount-expense'"
                        x-text="fmt(m.income - m.expense)"></td>
                    <td class="amount" x-text="m.income ? (Math.round((m.income-m.expense)/m.income*10000)/100)+'%' : '.'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>

      <!-- Tab: 태그 -->
      <template x-if="reportTab==='tags'">
        <div>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
            메모에 <code style="background:var(--surface);padding:2px 6px;border-radius:4px">#태그명</code>을 넣으면 태그별로 모아볼 수 있습니다.
            예) <code style="background:var(--surface);padding:2px 6px;border-radius:4px">#제주여행</code>
          </p>
          <template x-if="tagList.length === 0">
            <div class="card" style="text-align:center;color:var(--text-muted);padding:32px">
              이 기간에 태그가 있는 거래가 없습니다.
            </div>
          </template>
          <template x-if="tagList.length > 0">
            <div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
                <template x-for="t in tagList" :key="t.tag">
                  <button class="btn btn-sm"
                          :class="tagSelectedTag === t.tag ? 'btn-primary' : 'btn-outline'"
                          @click="selectTag(t.tag)"
                          style="display:flex;align-items:center;gap:6px">
                    <span x-text="'#' + t.tag"></span>
                    <span style="font-size:11px;opacity:0.7" x-text="t.count + '건'"></span>
                    <span style="font-size:11px;font-weight:600" x-text="fmt(t.total)"></span>
                  </button>
                </template>
              </div>

              <template x-if="tagSelectedTag && tagEntries.length > 0">
                <div>
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <h3 style="margin:0;font-size:15px">
                      <span style="color:var(--primary)">#<span x-text="tagSelectedTag"></span></span>
                      <span style="color:var(--text-muted);font-size:13px;margin-left:6px"
                            x-text="tagEntries.length + '건'"></span>
                    </h3>
                    <span style="font-size:15px;font-weight:700"
                          x-text="fmt(tagEntries.reduce((s,e) => s + Math.max(...e.lines.map(l=>l.debit)), 0))"></span>
                  </div>
                  <div style="margin-bottom:12px;display:flex;gap:8px;align-items:flex-start">
                    <textarea x-model="tagMemo" placeholder="태그 메모 (예: 3박4일 제주여행, 숙소는 서귀포)"
                              rows="2" style="flex:1;resize:vertical;min-height:36px;font-size:13px"
                              @input.debounce.500ms="saveTagMemo()"></textarea>
                    <span x-show="tagMemoSaving" style="font-size:11px;color:var(--text-muted);white-space:nowrap;padding-top:8px">저장중...</span>
                  </div>
                  <div class="card" style="padding:0;overflow-x:auto">
                    <table>
                      <thead><tr><th>날짜</th><th>설명</th><th class="amount">금액</th><th>차변</th><th>대변</th></tr></thead>
                      <tbody>
                        <template x-for="e in tagEntries" :key="e.id">
                          <tr>
                            <td><span x-text="fmtDate(e.entry_date)"></span><br><span style="font-size:11px;color:var(--text-muted)" x-text="fmtTime(e.created_at)"></span></td>
                            <td>
                              <div x-text="e.description"></div>
                              <div style="font-size:11px;color:var(--text-muted)" x-text="e.memo"></div>
                            </td>
                            <td class="amount" x-text="fmt(Math.max(...e.lines.map(l=>l.debit)))"></td>
                            <td x-html="acctWithBadge(e.lines,'debit')"></td>
                            <td x-html="acctWithBadge(e.lines,'credit')"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>

  <!-- Assets -->
  <template x-if="page==='assets'">
    <div>
      <h1>자산관리</h1>
      <div class="tabs" style="margin-bottom:12px">
        <div class="tab" :class="assetTab==='summary' && 'active'" @click="assetTab='summary'">종합</div>
        <div class="tab" :class="assetTab==='stocks' && 'active'" @click="assetTab='stocks'; loadStockPersons(); loadAllAccounts()">주식</div>
        <div class="tab" :class="assetTab==='realestate' && 'active'" @click="assetTab='realestate'; loadRealEstate()">부동산</div>
      </div>

      <!-- Tab: 종합 -->
      <template x-if="assetTab==='summary'">
        <div>
          <!-- Net worth hero -->
          <div class="card asset-hero">
            <div class="label">순자산</div>
            <div class="value" style="font-size:32px" x-text="fmt(assetSummary.net_worth)"></div>
            <div style="margin-top:8px;font-size:13px;color:var(--text-muted)">
              총 자산 <span x-text="fmt(assetSummary.total_assets)"></span>
              &nbsp;—&nbsp;
              총 부채 <span class="amount-expense" x-text="fmt(assetSummary.total_liability)"></span>
            </div>
          </div>

          <!-- Asset composition bar -->
          <div class="card" style="margin-top:12px" x-show="assetSummary.total_assets > 0">
            <div class="label" style="margin-bottom:8px">자산 구성</div>
            <div class="asset-bar">
              <div class="asset-bar-seg asset-bar-cash" :style="'width:'+assetPctVal(assetSummary.cash_bank)+'%'"
                   x-show="assetSummary.cash_bank > 0"></div>
              <div class="asset-bar-seg asset-bar-stock" :style="'width:'+assetPctVal(stocksCashTotal())+'%'"
                   x-show="stocksCashTotal() > 0"></div>
              <div class="asset-bar-seg asset-bar-pension" :style="'width:'+assetPctVal(stocksPensionTotal())+'%'"
                   x-show="stocksPensionTotal() > 0"></div>
              <div class="asset-bar-seg asset-bar-re" :style="'width:'+assetPctVal(assetSummary.realestate_total)+'%'"
                   x-show="assetSummary.realestate_total > 0"></div>
            </div>
            <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;flex-wrap:wrap">
              <span class="asset-legend"><span class="asset-dot asset-bar-cash"></span>현금/예금 <span x-text="assetPctVal(assetSummary.cash_bank)+'%'"></span></span>
              <span class="asset-legend"><span class="asset-dot asset-bar-stock"></span>주식(현금성) <span x-text="assetPctVal(stocksCashTotal())+'%'"></span></span>
              <span class="asset-legend"><span class="asset-dot asset-bar-pension"></span>주식(연금성) <span x-text="assetPctVal(stocksPensionTotal())+'%'"></span></span>
              <span class="asset-legend"><span class="asset-dot asset-bar-re"></span>부동산 <span x-text="assetPctVal(assetSummary.realestate_total)+'%'"></span></span>
            </div>
          </div>

          <!-- Asset breakdown cards -->
          <div class="stats" style="margin-top:12px">
            <div class="card stat-card">
              <div class="value" x-text="fmt(assetSummary.cash_bank)"></div>
              <div class="label">현금/예금</div>
            </div>
            <div class="card stat-card">
              <div class="value" x-text="fmt(stocksCashTotal())"></div>
              <div class="label">주식(현금성)</div>
            </div>
            <div class="card stat-card">
              <div class="value" x-text="fmt(stocksPensionTotal())"></div>
              <div class="label">주식(연금성)</div>
            </div>
            <div class="card stat-card">
              <div class="value" x-text="fmt(assetSummary.realestate_total)"></div>
              <div class="label">부동산</div>
            </div>
          </div>

          <!-- Per-person stock summary, split by cash/pension -->
          <template x-for="section in [{type:'cash',label:'현금성'},{type:'pension',label:'연금성'}]" :key="section.type">
            <template x-if="stocksSectionAccounts(section.type).length > 0">
              <div>
                <h3 style="margin:16px 0 8px;display:flex;justify-content:space-between;align-items:baseline">
                  <span x-text="'주식 — ' + section.label"></span>
                  <span style="font-size:16px;font-weight:600" x-text="fmt(stocksSectionTotal(section.type))"></span>
                </h3>
                <template x-for="person in assetSummary.stocks_by_person || []" :key="person.id">
                  <template x-if="person.accounts.filter(a=>a.account_type===(section.type)).length > 0">
                    <div class="card" style="margin-bottom:10px">
                      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
                        <h3 style="margin:0" x-text="person.name"></h3>
                        <span style="font-size:18px;font-weight:600" x-text="fmt(person.accounts.filter(a=>a.account_type===section.type).reduce((s,a)=>s+a.total_value,0))"></span>
                      </div>
                      <template x-for="bgroup in groupByBrokerage(person.accounts.filter(a=>a.account_type===section.type))" :key="bgroup.brokerage">
                        <div style="margin-bottom:10px">
                          <div style="font-size:0.85em;color:var(--text-muted);margin-bottom:4px" x-text="bgroup.brokerage"></div>
                          <template x-for="acct in bgroup.accounts" :key="acct.id">
                            <div style="margin-bottom:6px;padding:8px;border-radius:8px;background:var(--accent-bg,rgba(255,255,255,0.03))">
                              <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-weight:500">
                                <span x-text="acct.name"></span>
                                <span x-text="fmt(acct.total_value)"></span>
                              </div>

                            <button class="btn btn-sm btn-danger" @click="if(confirm(h.name+' 삭제?')) deleteStockHolding(h.id)">삭제</button>

                        </tr>

                    </tbody>
                  </table>
                </div>
              </template>
                </div>
              </template>
            </div>
          </template>
        </div>

      <!-- Tab: 부동산 -->
      <template x-if="assetTab==='realestate'">

          <div class="card" style="padding:0">
            <table>
              <thead><tr><th>이름</th><th class="amount">평가액</th><th>메모</th><th></th></tr></thead>
              <tbody>
                <template x-for="r in realEstateItems" :key="r.id">
                  <tr>
                    <td x-text="r.name"></td>
                    <td class="amount" x-text="fmt(r.value)"></td>
                    <td x-text="r.memo"></td>
                    <td style="white-space:nowrap">
                      <button class="btn btn-sm btn-outline" @click="editingRealEstate={...r}; showRealEstateModal=true">수정</button>
                      <button class="btn btn-sm btn-danger" @click="if(confirm(r.name+' 삭제?')) deleteRealEstate(r.id)">삭제</button>

              </tbody>
            </table>
          </div>

  <!-- Stock Person Modal -->
  <template x-if="showStockPersonModal">
    <div class="modal-bg" @click.self>
      <div class="modal" @keydown.enter.prevent="saveStockPerson()">
        <h2 x-text="editingStockPerson.id ? '명의자 수정' : '명의자 추가'"></h2>
        <div class="form-group"><label>이름</label><input type="text" x-model="editingStockPerson.name" placeholder="예: 남편"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" @click="showStockPersonModal=false">취소</button>
          <button class="btn btn-primary" @click="saveStockPerson()">저장</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Stock Account Modal -->
  <template x-if="showStockAccountModal">
    <div class="modal-bg" @click.self>
      <div class="modal" @keydown.enter.prevent="saveStockAccount()">
        <h2 x-text="editingStockAccount.id ? '계좌 수정' : '계좌 추가'"></h2>
        <div class="form-group"><label>증권사</label><input type="text" x-model="editingStockAccount.brokerage" placeholder="예: 키움증권"></div>
        <div class="form-group"><label>계좌명</label><input type="text" x-model="editingStockAccount.name" placeholder="예: 주식계좌, 연금저축"></div>
        <div class="form-group"><label>유형</label>
          <select x-model="editingStockAccount.account_type">
            <option value="cash">현금성</option>
            <option value="pension">연금성</option>
          </select>
        </div>
        <div class="form-group"><label>예수금 연결계정</label>
          <select x-model="editingStockAccount.linked_account_id">
            <option :value="null">없음</option>
            <template x-for="a in allAccounts.filter(a => a.type==='asset' && !a.is_group && a.name.endsWith('예수금'))" :key="a.id">
              <option :value="a.id" x-text="a.name"></option>
            </template>
          </select>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" @click="showStockAccountModal=false">취소</button>
          <button class="btn btn-primary" @click="saveStockAccount()">저장</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Stock Holding Modal -->
  <template x-if="showStockHoldingModal">
    <div class="modal-bg" @click.self>
      <div class="modal" @keydown.enter.prevent="saveStockHolding()">
        <h2 x-text="editingStockHolding.id ? '종목 수정' : '종목 추가'"></h2>
        <div class="form-group" style="display:flex;gap:12px;align-items:center">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" x-model="editingStockHolding.is_foreign"> 해외주식
          </label>
          <select x-show="editingStockHolding.is_foreign" x-model="editingStockHolding.exchange" style="width:auto">
            <option value="O">나스닥</option>
            <option value="N">뉴욕(NYSE)</option>
            <option value="A">아멕스</option>
          </select>
        </div>
        <div class="form-group"><label>종목코드</label><input type="text" x-model="editingStockHolding.ticker" :placeholder="editingStockHolding.is_foreign ? 'AAPL' : '005930'" @blur="lookupTicker()"></div>
        <div class="form-group"><label>종목명</label><input type="text" x-model="editingStockHolding.name" :placeholder="editingStockHolding.is_foreign ? 'Apple Inc' : '삼성전자'"></div>
        <div class="form-group"><label>수량</label><input type="text" inputmode="numeric"
            :value="editingStockHolding.quantity ? editingStockHolding.quantity.toLocaleString() : ''"
            @input="editingStockHolding.quantity = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div class="form-group"><label>평균 매입가</label><input type="text" inputmode="numeric"
            :value="editingStockHolding.avg_price ? editingStockHolding.avg_price.toLocaleString() : ''"
            @input="editingStockHolding.avg_price = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" @click="showStockHoldingModal=false">취소</button>
          <button class="btn btn-primary" @click="saveStockHolding()">저장</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Sell Holding Modal -->
  <template x-if="showStockSellModal">
    <div class="modal-bg" @click.self>
      <div class="modal" @keydown.enter.prevent="sellStockHolding()">
        <h2>주식 매도</h2>
        <div style="margin-bottom:12px;color:var(--text-muted)">
          <strong x-text="sellingStockHolding.name"></strong>
          (<span x-text="sellingStockHolding.ticker"></span>)
          · 보유 <span x-text="(sellingStockHolding.quantity||0).toLocaleString()"></span>주
          · 평단가 <span x-text="fmt(sellingStockHolding.avg_price||0)"></span>
        </div>
        <div class="form-group"><label>매도 수량</label><input type="text" inputmode="numeric"
            :value="sellingStockHolding.sell_quantity ? sellingStockHolding.sell_quantity.toLocaleString() : ''"
            @input="sellingStockHolding.sell_quantity = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div class="form-group"><label>매도 단가</label><input type="text" inputmode="numeric"
            :value="sellingStockHolding.sell_price ? sellingStockHolding.sell_price.toLocaleString() : ''"
            @input="sellingStockHolding.sell_price = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div class="form-group"><label>수수료/세금</label><input type="text" inputmode="numeric"
            :value="sellingStockHolding.fee ? sellingStockHolding.fee.toLocaleString() : ''"
            @input="sellingStockHolding.fee = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div x-show="sellingStockHolding.sell_quantity > 0 && sellingStockHolding.sell_price > 0"
             style="margin:8px 0;padding:8px;border-radius:6px;background:var(--accent-bg,rgba(255,255,255,0.03));font-size:0.9em">
          매도대금: <strong x-text="fmt(sellingStockHolding.sell_quantity * sellingStockHolding.sell_price)"></strong><br>
          수수료: <span x-text="fmt(sellingStockHolding.fee||0)"></span><br>
          취득원가: <span x-text="fmt(sellingStockHolding.sell_quantity * (sellingStockHolding.avg_price||0))"></span><br>
          예상 손익:
          <strong :class="(sellingStockHolding.sell_quantity * sellingStockHolding.sell_price - (sellingStockHolding.fee||0) - sellingStockHolding.sell_quantity * (sellingStockHolding.avg_price||0)) >= 0 ? 'amount-income' : 'amount-expense'"
                  x-text="((v) => (v>=0?'+':'') + fmt(v))(sellingStockHolding.sell_quantity * sellingStockHolding.sell_price - (sellingStockHolding.fee||0) - sellingStockHolding.sell_quantity * (sellingStockHolding.avg_price||0))"></strong>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" @click="showStockSellModal=false">취소</button>
          <button class="btn btn-primary" @click="sellStockHolding()">매도 실행</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Real Estate Modal -->
  <template x-if="showRealEstateModal">
    <div class="modal-bg" @click.self>
      <div class="modal" @keydown.enter.prevent="saveRealEstate()">
        <h2 x-text="editingRealEstate.id ? '부동산 수정' : '부동산 추가'"></h2>
        <div class="form-group"><label>이름</label><input type="text" x-model="editingRealEstate.name" placeholder="서울 아파트"></div>
        <div class="form-group"><label>평가액</label><input type="text" inputmode="numeric"
            :value="editingRealEstate.value ? editingRealEstate.value.toLocaleString() : ''"
            @input="editingRealEstate.value = Number($event.target.value.replace(/,/g,'')) || 0"></div>
        <div class="form-group"><label>메모</label><textarea x-model="editingRealEstate.memo" rows="2" style="resize:vertical;min-height:36px"></textarea></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" @click="showRealEstateModal=false">취소</button>
          <button class="btn btn-primary" @click="saveRealEstate()">저장</button>
        </div>
      </div>
    </div>

  <!-- Messages -->
  <template x-if="page==='messages'">
    <div>
      <h1>수신 메시지</h1>
      <div class="tabs" style="margin-bottom:12px">
        <template x-for="s in [null,'pending','parsed','approved','rejected','failed','duplicate']" :key="s">
          <div class="tab" :class="msgFilter===s?'active':''"
               @click="msgFilter=s; loadMessages()"
               x-text="s ? statusKo(s) : '전체'"></div>
        </template>
      </div>
      <template x-for="m in messages" :key="m.id">
        <div class="card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:8px">
              <strong x-text="m.source_name"></strong>
              <span class="tag" :class="'tag-'+m.status" x-text="statusKo(m.status)"></span>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="font-size:12px;color:var(--text-muted)" x-text="fmtTimestamp(m.timestamp)"></span>
              <button class="btn btn-sm btn-outline" @click="reparseMsg(m.id)">재파싱</button>
            </div>
          </div>
          <div class="raw-msg" x-text="m.content"></div>

          <!-- AI 파싱 결과 -->
          <template x-if="parseAiResult(m.ai_result)">
            <div class="msg-ai-result" x-data="{ r: parseAiResult(m.ai_result) }">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <!-- 신뢰도 -->
                <span class="msg-confidence" :class="confidenceClass(r.confidence)"
                      x-text="'신뢰도 ' + Math.round(r.confidence * 100) + '%'"></span>
                <!-- 거래 유형 -->
                <span class="tag tag-parsed" x-text="txnTypeLabel(r.transaction_type)"></span>
                <!-- 금액 -->
                <template x-if="r.amount">
                  <strong style="font-size:14px" x-text="'₩' + r.amount.toLocaleString()"></strong>
                </template>
                <!-- 가맹점 -->
                <template x-if="r.merchant">
                  <span style="color:var(--text-secondary)" x-text="r.merchant"></span>
                </template>
              </div>
              <!-- 계정 매핑 -->
              <template x-if="r.suggested_debit_code || r.suggested_credit_code">
                <div class="msg-account-map">
                  <span class="msg-account debit" x-text="acctName(r.suggested_debit_code)"></span>
                  <span style="color:var(--text-muted)">→</span>
                  <span class="msg-account credit" x-text="acctName(r.suggested_credit_code)"></span>
                  <template x-if="r.memo">
                    <span style="font-size:11px;color:var(--text-muted)" x-text="r.memo"></span>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- 파싱 실패 -->
          <template x-if="m.status === 'failed' && !parseAiResult(m.ai_result)">
            <div class="msg-failed">AI 파싱 실패 — 재파싱을 시도하거나 수동으로 입력하세요</div>
          </template>
        </div>
      </template>
      <template x-if="messages.length === 0">
        <p style="color:var(--text-muted);text-align:center;padding:32px 0">메시지가 없습니다</p>
      </template>
    </div>
  </template>

  <!-- Settings -->
  <template x-if="page==='settings'">
    <div>
      <h1>설정</h1>

      <h2>테마</h2>
      <div class="card" style="padding:12px">
        <div class="theme-grid">
          <template x-for="p in themePresets" :key="p.id">
            <button class="theme-preset" :class="theme===p.id && 'theme-preset-active'"
                    @click="setTheme(p.id)">
              <span class="theme-preview" :data-theme="p.id"></span>
              <span class="theme-preset-name" x-text="p.name"></span>
            </button>
          </template>
        </div>
      </div>

      <h2>그룹 색상</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
        거래내역에서 계정 이름에 그룹별 배경색을 표시합니다.
      </p>
      <div class="card" style="padding:12px">
        <template x-for="g in uniqueGroups()" :key="g">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="min-width:60px;font-size:14px;font-weight:500" x-text="g"></span>
            <input type="color" :value="groupColors[g] || '#6366f1'"
                   @input="saveGroupColor(g, $event.target.value)"
                   style="width:36px;height:28px;border:none;cursor:pointer;background:none">
            <span style="padding:2px 8px;border-radius:4px;font-size:12px"
                  :style="groupColors[g] ? `background:${groupColors[g]}30;border-left:3px solid ${groupColors[g]}` : ''"
                  x-text="'예시 계정'"></span>
            <button class="btn btn-sm btn-outline" @click="removeGroupColor(g)"
                    x-show="groupColors[g]" style="font-size:11px">초기화</button>
          </div>
        </template>
        <template x-if="uniqueGroups().length === 0">
          <p style="color:var(--text-muted);font-size:13px">그룹 계정이 없습니다.</p>
        </template>
      </div>

      <h2>자동 분류 규칙</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
        거래 승인 시 가맹점 패턴이 자동 학습됩니다. 여기서 직접 수정/삭제할 수 있습니다.
      </p>
      <div class="card" style="padding:0">
        <table>
          <thead><tr><th>가맹점 패턴</th><th>차변</th><th>대변</th><th>적용 횟수</th><th></th></tr></thead>
          <tbody>
            <template x-for="r in rules" :key="r.id">
              <tr>
                <td x-text="r.merchant_pattern"></td>
                <td style="font-size:13px" x-text="r.debit_account_name || '-'"></td>
                <td style="font-size:13px" x-text="r.credit_account_name || '-'"></td>
                <td style="text-align:center" x-text="r.hit_count"></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="btn btn-sm btn-outline" @click="editRule(r)">수정</button>
                    <button class="btn btn-sm btn-danger" @click="deleteRule(r.id)">삭제</button>
                  </div>
                </td>
              </tr>
            </template>
            <template x-if="rules.length === 0">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">등록된 규칙 없음</td></tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

    </div><!-- /.container -->
  </main>
</div><!-- /.app-layout -->

<!-- Edit Entry Modal -->
<div class="modal-bg" x-show="showEditModal" x-cloak @click.self>
    <div class="modal" @keydown.enter="if($event.shiftKey||$event.ctrlKey)return;$event.preventDefault();saveEntry()">
      <h2 x-text="editingEntry.id ? '거래 수정' : '수동 입력'"></h2>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" x-model="editingEntry.entry_date">
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" x-model="editingEntry.description" placeholder="스타벅스 카드결제">
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea x-model="editingEntry.memo" rows="2" style="resize:vertical;min-height:36px"></textarea>
      </div>
      <!-- Compound entry (3+ lines): show all lines read-only -->
      <template x-if="editingEntry.lines && editingEntry.lines.length > 2">
        <div>
          <label style="font-weight:600;margin-bottom:6px;display:block">분개 내역</label>
          <table style="width:100%;font-size:0.9em;margin-bottom:8px">
            <thead><tr><th style="text-align:left">계정</th><th class="amount">차변</th><th class="amount">대변</th></tr></thead>
            <tbody>
              <template x-for="l in editingEntry.lines" :key="l.id">
                <tr>
                  <td x-text="l.account_name || l.account_code || ''"></td>
                  <td class="amount" x-text="l.debit > 0 ? fmt(l.debit) : ''"></td>
                  <td class="amount" x-text="l.credit > 0 ? fmt(l.credit) : ''"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
      <!-- Simple entry (2 lines): editable -->
      <template x-if="!editingEntry.lines || editingEntry.lines.length <= 2">
        <div>
      <div class="form-group">
        <label>금액</label>
        <input type="text" inputmode="numeric"
               :value="editAmount ? editAmount.toLocaleString() : ''"
               @input="editAmount = Number($event.target.value.replace(/,/g,'')) || 0"
               placeholder="15,000">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>차변 (지출 항목)</label>
          <select x-model.number="editDebitAcct">
            <template x-for="t in groupedSelectableAccounts()" :key="t.type">
              <optgroup :label="t.label">
                <template x-for="item in t.items" :key="item.id">
                  <option :value="item.isHeader ? '' : item.id"
                          :disabled="item.isHeader"
                          x-text="'\u00A0'.repeat(item.depth*2)+(item.isHeader ? '\u25B8 '+item.name : item.code+' '+item.name)"></option>
                </template>
              </optgroup>
            </template>
          </select>
        </div>
        <div class="form-group">
          <label>대변 (결제 수단)</label>
          <select x-model.number="editCreditAcct">
            <template x-for="t in groupedSelectableAccounts()" :key="t.type">
              <optgroup :label="t.label">
                <template x-for="item in t.items" :key="item.id">
                  <option :value="item.isHeader ? '' : item.id"
                          :disabled="item.isHeader"
                          x-text="'\u00A0'.repeat(item.depth*2)+(item.isHeader ? '\u25B8 '+item.name : item.code+' '+item.name)"></option>
                </template>
              </optgroup>
            </template>
          </select>
        </div>
      </div>
        </div>
      </template>
      <div x-show="editingEntry.raw_content" class="raw-msg" style="margin-bottom:12px"
           x-text="editingEntry.raw_content"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-outline" @click="showEditModal=false">취소</button>
        <template x-if="editingEntry.id && !editingEntry.is_confirmed">
          <button class="btn btn-danger" @click="rejectEntry(editingEntry.id); showEditModal=false">거부</button>
        </template>
        <button class="btn btn-primary" @click="saveEntry()">저장</button>
      </div>
    </div>
  </div>

<!-- Account Modal -->
<template x-if="showAcctModal">
  <div class="modal-bg" @click.self>
    <div class="modal" @keydown.enter.prevent="saveAcct()">
      <h2 x-text="editingAcct.id ? '계정 수정' : '계정 추가'"></h2>
      <div class="form-group">
        <label>유형</label>
        <select x-model="editingAcct.type" @change="autoFillCode()">
          <option value="asset">자산</option>
          <option value="liability">부채</option>
          <option value="equity">자본</option>
          <option value="income">수입</option>
          <option value="expense">비용</option>
        </select>
      </div>
      <div class="form-group">
        <label>상위 계정 (그룹)</label>
        <select :value="editingAcct.parent_id ?? ''" @change="editingAcct.parent_id = $event.target.value === '' ? null : Number($event.target.value)">
          <option value="">없음 (최상위)</option>
          <template x-for="p in parentCandidates()" :key="p.id">
            <option :value="p.id" x-text="p.code + ' ' + p.name"></option>
          </template>
        </select>
      </div>
      <div class="form-group">
        <label>코드 <span style="font-weight:400;color:var(--text-muted)">(자동 생성)</span></label>
        <input type="text" x-model="editingAcct.code" placeholder="자동 생성" readonly style="opacity:0.7;cursor:default">
      </div>
      <div class="form-group">
        <label>이름 (이모지 사용 가능)</label>
        <input type="text" x-model="editingAcct.name" placeholder="🍔 외식">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" :checked="editingAcct.is_group" @change="editingAcct.is_group = $event.target.checked ? 1 : 0">
          <span>그룹 계정</span>
          <span style="font-weight:400;color:var(--text-muted);font-size:12px">(하위 계정의 컨테이너, 직접 거래 입력 불가)</span>
        </label>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-outline" @click="showAcctModal=false">취소</button>
        <button class="btn btn-primary" @click="saveAcct()">저장</button>
      </div>
    </div>
  </div>
</template>

<!-- Rule Modal -->
<template x-if="showRuleModal">
  <div class="modal-bg" @click.self>
    <div class="modal">
      <h2>규칙 수정</h2>
      <div class="form-group">
        <label>가맹점 패턴</label>
        <input type="text" x-model="editingRule.merchant_pattern" placeholder="스타벅스">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>차변 (지출 항목)</label>
          <select x-model.number="editingRule.debit_account_id">
            <template x-for="t in groupedSelectableAccounts()" :key="t.type">
              <optgroup :label="t.label">
                <template x-for="item in t.items" :key="item.id">
                  <option :value="item.isHeader ? '' : item.id"
                          :disabled="item.isHeader"
                          x-text="'\u00A0'.repeat(item.depth*2)+(item.isHeader ? '\u25B8 '+item.name : item.code+' '+item.name)"></option>
                </template>
              </optgroup>
            </template>
          </select>
        </div>
        <div class="form-group">
          <label>대변 (결제 수단)</label>
          <select x-model.number="editingRule.credit_account_id">
            <template x-for="t in groupedSelectableAccounts()" :key="t.type">
              <optgroup :label="t.label">
                <template x-for="item in t.items" :key="item.id">
                  <option :value="item.isHeader ? '' : item.id"
                          :disabled="item.isHeader"
                          x-text="'\u00A0'.repeat(item.depth*2)+(item.isHeader ? '\u25B8 '+item.name : item.code+' '+item.name)"></option>
                </template>
              </optgroup>
            </template>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-outline" @click="showRuleModal=false">취소</button>
        <button class="btn btn-primary" @click="saveRule()">저장</button>
      </div>
    </div>
  </div>
</template>

<script src="/js/utils.js"></script>
<script src="/js/pin.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/entries.js"></script>
<script src="/js/accounts.js"></script>
<script src="/js/report.js"></script>
<script src="/js/assets.js"></script>
<script src="/js/messages.js"></script>
<script src="/js/settings.js"></script>
<script src="/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
